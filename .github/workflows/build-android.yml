name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk python3-pip \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev liblzma-dev \
          cmake libffi-dev libssl-dev \
          automake m4 libltdl-dev \
          ffmpeg libavcodec-dev libavformat-dev libavdevice-dev \
          libavutil-dev libswscale-dev libswresample-dev libavfilter-dev \
          libltdl-dev
          
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython
        
    - name: Cache buildozer dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.cache/pip
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
          
    - name: Build APK
      timeout-minutes: 180
      run: |
        echo "=== Starting Build ==="
        echo "Current directory: $(pwd)"
        
        # Run buildozer (it will auto-download SDK if needed)
        buildozer android debug 2>&1 | tee build.log || true
        
        echo "=== Build completed ==="
        echo "=== Check bin/ directory ==="
        ls -la bin/ 2>/dev/null || echo "bin/ not found"
        echo "=== Check .buildozer/ directory ==="
        find .buildozer -name "*.apk" -type f 2>/dev/null | head -20 || echo "No APK in .buildozer"
      env:
        BUILDOZER_WARN_ON_ROOT: 0
        
    - name: Find and copy APK
      run: |
        echo "=== Searching for APK ==="
        APK_PATH=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
        if [ -n "$APK_PATH" ]; then
          echo "Found APK: $APK_PATH"
          mkdir -p bin
          cp "$APK_PATH" bin/
          ls -la bin/
        else
          echo "No APK found"
          echo "=== Build log tail ==="
          tail -100 build.log
          exit 1
        fi
        
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build.log
        if-no-files-found: ignore
        
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: surgery-cam-apk-v1.2.0
        path: bin/*.apk
        if-no-files-found: error
