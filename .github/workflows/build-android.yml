name: Build Android APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - uses: android-actions/setup-android@v3
    - name: Install platform tools and build-tools
      run: |
        sdkmanager "platform-tools" "build-tools;33.0.0" "platforms;android-33"
    - run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev liblzma-dev cmake libffi-dev libssl-dev
    - run: pip install buildozer cython
    - name: Build APK with system SDK
      run: |
        export ANDROIDSDK=$ANDROID_SDK_ROOT
        export ANDROIDNDK=$ANDROID_SDK_ROOT/ndk/25.2.9519653
        export PATH=$PATH:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/build-tools/33.0.0
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0
        JAVA_HOME: /usr/lib/jvm/temurin-11-jdk-amd64
    - uses: actions/upload-artifact@v4
      with:
        name: surgery-cam-apk
        path: bin/*.apk
