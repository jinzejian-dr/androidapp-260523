name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk python3-pip \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev liblzma-dev \
          cmake libffi-dev libssl-dev \
          automake m4 libltdl-dev \
          ffmpeg libavcodec-dev libavformat-dev libavdevice-dev \
          libavutil-dev libswscale-dev libswresample-dev libavfilter-dev \
          libltdl-dev
          
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython
        
    - name: Cache buildozer dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.cache/pip
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
          
    - name: Setup Android SDK
      run: |
        # Create directories
        mkdir -p ~/.buildozer/android/platform
        
        # Download and setup Android SDK
        cd ~/.buildozer/android/platform
        if [ ! -d "android-sdk" ]; then
          echo "Downloading Android SDK..."
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mkdir -p android-sdk/cmdline-tools/latest
          mv cmdline-tools/* android-sdk/cmdline-tools/latest/ 2>/dev/null || true
          rm -rf cmdline-tools
          rm commandlinetools-linux-9477386_latest.zip
        fi
        
        # Create old tools directory structure that buildozer expects
        mkdir -p android-sdk/tools/bin
        ln -sf ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager android-sdk/tools/bin/sdkmanager
        
        # Set up environment
        export ANDROID_SDK_ROOT=~/.buildozer/android/platform/android-sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/tools/bin
        
        # Accept all licenses
        echo "Accepting Android SDK licenses..."
        yes | sdkmanager --licenses || true
        
        # Install required packages
        sdkmanager "platform-tools" "build-tools;33.0.0" "platforms;android-33" "ndk;25.2.9519653" || true
        
        # Create licenses directory
        mkdir -p $ANDROID_SDK_ROOT/licenses
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
        
        echo "SDK setup completed"
        echo "SDK location: $ANDROID_SDK_ROOT"
        ls -la $ANDROID_SDK_ROOT/tools/bin/ || true
        
    - name: Build APK
      timeout-minutes: 180
      run: |
        echo "=== Starting Build ==="
        
        # Set environment
        export ANDROID_SDK_ROOT=~/.buildozer/android/platform/android-sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/tools/bin:$ANDROID_SDK_ROOT/platform-tools
        
        # Debug: Check SDK setup
        echo "Checking SDK setup..."
        ls -la ~/.buildozer/android/platform/android-sdk/ || true
        ls -la ~/.buildozer/android/platform/android-sdk/tools/bin/ || true
        
        # Run buildozer
        buildozer android debug 2>&1 | tee build.log || true
        
        echo "=== Build completed ==="
        echo "=== Check bin/ directory ==="
        ls -la bin/ 2>/dev/null || echo "bin/ not found"
        echo "=== Check .buildozer/ directory ==="
        find .buildozer -name "*.apk" -type f 2>/dev/null | head -20 || echo "No APK in .buildozer"
      env:
        BUILDOZER_WARN_ON_ROOT: 0
        
    - name: Find and copy APK
      run: |
        echo "=== Searching for APK ==="
        APK_PATH=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
        if [ -n "$APK_PATH" ]; then
          echo "Found APK: $APK_PATH"
          mkdir -p bin
          cp "$APK_PATH" bin/
          ls -la bin/
        else
          echo "No APK found"
          echo "=== Build log tail ==="
          tail -100 build.log
          exit 1
        fi
        
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build.log
        if-no-files-found: ignore
        
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: surgery-cam-apk-v1.2.0
        path: bin/*.apk
        if-no-files-found: error
