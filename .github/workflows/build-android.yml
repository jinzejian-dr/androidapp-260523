name: Build Android APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - uses: android-actions/setup-android@v3
    - name: Debug Android SDK
      run: |
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        echo "ANDROID_HOME: $ANDROID_HOME"
        ls -la $ANDROID_SDK_ROOT/
        ls -la $ANDROID_SDK_ROOT/build-tools/ || true
        find $ANDROID_SDK_ROOT -name "aidl" 2>/dev/null || echo "aidl not found"
    - run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev liblzma-dev cmake libffi-dev libssl-dev
    - run: pip install buildozer cython
    - run: buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0
    - uses: actions/upload-artifact@v4
      with:
        name: surgery-cam-apk
        path: bin/*.apk
