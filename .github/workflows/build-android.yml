name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Setup Android SDK for buildozer
      run: |
        export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64
        sdkmanager "platform-tools" "build-tools;33.0.0" "platforms;android-33" "ndk;25.2.9519653"
        mkdir -p ~/.buildozer/android/platform
        ln -sf $ANDROID_SDK_ROOT ~/.buildozer/android/platform/android-sdk
        mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools
        ln -sf $ANDROID_SDK_ROOT/build-tools/33.0.0 ~/.buildozer/android/platform/android-sdk/build-tools/33.0.0
        mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
        echo '#!/bin/bash' > ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        echo 'export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64' >> ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        echo 'exec $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "$@"' >> ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        chmod +x ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        
    - name: Cache buildozer dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.cache/pip
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
          
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk python3-pip \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev liblzma-dev \
          cmake libffi-dev libssl-dev \
          automake m4 libltdl-dev \
          ffmpeg libavcodec-dev libavformat-dev libavdevice-dev \
          libavutil-dev libswscale-dev libswresample-dev libavfilter-dev
          
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython
        
    - name: Verify buildozer installation
      run: |
        buildozer --version
        buildozer android check
        
    - name: Build APK
      timeout-minutes: 120
      run: |
        echo "=== Starting Build ==="
        buildozer android debug 2>&1 | tee build.log
        echo "=== Build completed ==="
        echo "=== Check bin/ directory ==="
        ls -la bin/ 2>/dev/null || echo "bin/ not found"
        echo "=== Check .buildozer/ directory ==="
        find .buildozer -name "*.apk" -type f 2>/dev/null | head -20 || echo "No APK in .buildozer"
        echo "=== Check all APK files ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found anywhere"
      env:
        BUILDOZER_WARN_ON_ROOT: 0
        JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        
    - name: Find and copy APK
      run: |
        echo "=== Searching for APK ==="
        APK_PATH=$(find .buildozer -name "*.apk" -type f 2>/dev/null | head -1)
        if [ -n "$APK_PATH" ]; then
          echo "Found APK: $APK_PATH"
          mkdir -p bin
          cp "$APK_PATH" bin/
          ls -la bin/
          echo "APK_SIZE=$(stat -c%s "$APK_PATH")" >> $GITHUB_ENV
        else
          echo "No APK found in .buildozer"
          find . -name "*.apk" -type f 2>/dev/null
          exit 1
        fi
        
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build.log
        if-no-files-found: ignore
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: surgery-cam-apk-v1.1.4
        path: bin/*.apk
        if-no-files-found: error
        
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.1.4-${{ github.run_number }}
        name: SurgeryCam v1.1.4 Build ${{ github.run_number }}
        body: |
          ## SurgeryCam Android App v1.1.4
          
          ### Changes
          - Added ffpyplayer support for video playback
          - Added FFmpeg dependencies
          - Improved error handling and logging
          - Fixed build configuration
          
          ### Build Info
          - Build Date: ${{ github.event.head_commit.timestamp }}
          - Commit: ${{ github.sha }}
          
          ### Requirements
          - Android 5.0+ (API 21+)
          - ARM64 device
        files: bin/*.apk
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
